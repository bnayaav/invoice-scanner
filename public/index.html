<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1f2e" />
  <title>סורק חשבוניות</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231a1f2e'/%3E%3Cpath d='M30 28h40v44L60 64l-10 8-10-8-10 8z' fill='%23fcd34d'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@zxing/library@0.21.0/umd/index.min.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- ─── Setup screen (first run) ─── -->
  <section id="setup" class="login-screen hidden">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <h1>הקמה ראשונית</h1>
        <p>צור את חשבון המנהל הראשון</p>
      </div>
      <form id="setup-form" class="login-form">
        <label>
          <span>שם תצוגה</span>
          <input type="text" name="display_name" required placeholder="לדוגמה: בניה" />
        </label>
        <label>
          <span>שם משתמש (אנגלית)</span>
          <input type="text" name="username" autocomplete="username" autocapitalize="off" required pattern="[a-z0-9_]+" placeholder="admin" />
        </label>
        <label>
          <span>סיסמה (לפחות 6 תווים)</span>
          <input type="password" name="password" autocomplete="new-password" required minlength="6" />
        </label>
        <button type="submit" class="btn-primary">
          <span class="btn-text">צור משתמש</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
        <p id="setup-error" class="error-text hidden"></p>
      </form>
    </div>
  </section>

  <!-- ─── Login screen ─── -->
  <section id="login" class="login-screen hidden">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="13" y2="17"/>
          </svg>
        </div>
        <h1>סורק חשבוניות</h1>
        <p>קליטת מוצרים חכמה לקופה</p>
      </div>
      <form id="login-form" class="login-form">
        <label>
          <span>שם משתמש</span>
          <input type="text" name="username" autocomplete="username" autocapitalize="off" required />
        </label>
        <label>
          <span>סיסמה</span>
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn-primary">
          <span class="btn-text">התחבר</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
        <p id="login-error" class="error-text hidden"></p>
      </form>
    </div>
  </section>

  <!-- ─── Main app ─── -->
  <main id="app" class="hidden">
    <header class="app-header">
      <div class="header-row">
        <div class="brand">
          <div class="brand-icon-small">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <div>
            <h1>סורק חשבוניות</h1>
            <p id="user-greeting"></p>
          </div>
        </div>
        <div style="display:flex; gap:6px;">
          <button id="suppliers-btn" class="icon-btn hidden" title="ספקים">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 3h5v5M21 3l-7 7M8 21H3v-5M3 21l7-7"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
          <button id="categories-btn" class="icon-btn hidden" title="מחלקות">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
          <button id="logout-btn" class="icon-btn" title="התנתק">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-tab="new">חדשה</button>
        <button class="tab" data-tab="history">היסטוריה</button>
      </nav>
    </header>

    <!-- ─── Tab: New invoice ─── -->
    <section id="tab-new" class="tab-panel active">
      <div id="new-content"></div>
    </section>

    <!-- ─── Tab: History ─── -->
    <section id="tab-history" class="tab-panel">
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="history-search" type="search" placeholder="חיפוש ספק / מס׳ חשבונית / מוצר..." />
      </div>
      <div class="filter-pills">
        <button class="pill active" data-status="">הכל</button>
        <button class="pill" data-status="draft">טיוטה</button>
        <button class="pill" data-status="ready">מוכן לייבוא</button>
        <button class="pill" data-status="imported">יובא</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>
  </main>

  <!-- ─── Loading overlay ─── -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loader-card">
      <div class="loader-spinner"></div>
      <p id="loading-text">טוען...</p>
    </div>
  </div>

  <!-- ─── Toast ─── -->
  <div id="toast" class="toast hidden"></div>

  <!-- File inputs (hidden, triggered programmatically) -->
  <input id="file-input" type="file" accept="image/*" multiple hidden />
  <input id="camera-input" type="file" accept="image/*" capture="environment" multiple hidden />

  <!-- Barcode scanner modal -->
  <div id="barcode-modal" class="modal-overlay hidden">
    <div class="barcode-modal">
      <div class="barcode-header">
        <h3>סרוק ברקוד</h3>
        <button class="icon-btn" id="barcode-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="barcode-video-wrap">
        <video id="barcode-video" autoplay playsinline muted></video>
        <div class="barcode-frame"></div>
      </div>
      <p class="barcode-hint" id="barcode-status">מכוון את הברקוד למסגרת</p>
      <button class="btn-primary" id="barcode-manual">הזנה ידנית במקום</button>
    </div>
  </div>

  <!-- Suppliers management modal -->
  <div id="suppliers-modal" class="modal-overlay hidden">
    <div class="categories-modal">
      <div class="barcode-header">
        <h3>ניהול ספקים</h3>
        <button class="icon-btn" id="suppliers-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="categories-add-row">
        <input id="new-supplier-name" type="text" placeholder="שם ספק חדש" />
        <button class="btn-primary" id="add-supplier-btn">הוסף</button>
      </div>
      <div class="categories-add-row" style="border-top: none; padding-top: 0;">
        <input id="suppliers-search" type="search" placeholder="חיפוש ספק..." style="flex:1;" />
      </div>
      <div id="suppliers-list" class="categories-list"></div>
    </div>
  </div>

  <!-- Categories management modal -->
  <div id="categories-modal" class="modal-overlay hidden">
    <div class="categories-modal">
      <div class="barcode-header">
        <h3>ניהול מחלקות</h3>
        <button class="icon-btn" id="categories-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="categories-add-row">
        <input id="new-category-name" type="text" placeholder="שם מחלקה חדשה (לדוגמה: 9.טלפונים)" />
        <button class="btn-primary" id="add-category-btn">הוסף</button>
      </div>
      <div id="categories-list" class="categories-list"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
